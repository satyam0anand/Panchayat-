<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panchayat Seva FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;background:#0d1117;color:#fff;padding:20px}
.btn{padding:12px 18px;background:#f97316;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}
.input{padding:10px;width:100%;margin-top:10px;background:#111;border:1px solid #333;color:#fff}
.preview{width:100%;margin-top:10px;border-radius:8px}
</style>
</head>
<body>

<h2>🏛️ Panchayat Seva (AI Fixed)</h2>

<input type="text" id="aadhaar" class="input" placeholder="Aadhaar Number">
<input type="text" id="pan" class="input" placeholder="PAN Number">

<br><br>
<button class="btn" onclick="openSrc('aadhaar')">📸 Upload Aadhaar</button>
<button class="btn" onclick="openSrc('pan')">📸 Upload PAN</button>

<input type="file" id="file-aadhaar" accept="image/*" style="display:none">
<input type="file" id="file-pan" accept="image/*" style="display:none">

<img id="preview" class="preview"/>

<script>
let currentType = null;

function openSrc(type){
  currentType = type;
  document.getElementById('file-'+type).click();
}

document.getElementById('file-aadhaar').onchange = handleFile;
document.getElementById('file-pan').onchange = handleFile;

async function handleFile(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = async function(ev){
    const img = ev.target.result;
    document.getElementById('preview').src = img;

    try{
      const result = await Tesseract.recognize(img, 'eng');
      const text = result.data.text;

      if(currentType === 'aadhaar'){
        const match = text.match(/\d{4}\s?\d{4}\s?\d{4}/);
        if(match) document.getElementById('aadhaar').value = match[0];
        else alert('Aadhaar not detected');
      }

      if(currentType === 'pan'){
        const match = text.match(/[A-Z]{5}[0-9]{4}[A-Z]/);
        if(match) document.getElementById('pan').value = match[0];
        else alert('PAN not detected');
      }

      alert('✅ AI Done');

    }catch(err){
      alert('❌ AI Failed');
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
