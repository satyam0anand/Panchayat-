<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panchayat Seva AI FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;background:#0d1117;color:#fff;padding:20px}
.container{max-width:500px;margin:auto}
.card{background:#161b27;padding:15px;border-radius:12px;margin-bottom:15px}
.input{width:100%;padding:10px;margin-top:8px;background:#111;border:1px solid #333;color:#fff}
.btn{padding:14px;background:#f97316;border:none;border-radius:10px;color:#fff;font-weight:bold;width:100%;margin-top:10px}
img{width:100%;margin-top:10px;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<h2>🏛️ Panchayat Seva – AI FINAL</h2>

<div class="card">
<input id="f-name" class="input" placeholder="Name">
<input id="f-dob" class="input" placeholder="DOB">
<input id="f-gender" class="input" placeholder="Gender">
<input id="f-aadhaar" class="input" placeholder="Aadhaar">
<input id="f-pan" class="input" placeholder="PAN">
</div>

<button class="btn" onclick="pick()">📸 Upload Document</button>
<input type="file" id="file" accept="image/*" style="display:none">

<img id="preview">

</div>

<script>

function pick(){
  document.getElementById('file').click();
}

document.getElementById('file').onchange = handle;

function preprocess(img){
  const c=document.createElement('canvas');
  const ctx=c.getContext('2d');

  c.width=img.width*2;
  c.height=img.height*2;

  ctx.drawImage(img,0,0,c.width,c.height);

  const d=ctx.getImageData(0,0,c.width,c.height);
  for(let i=0;i<d.data.length;i+=4){
    let avg=(d.data[i]+d.data[i+1]+d.data[i+2])/3;
    avg=avg>128?255:0;
    d.data[i]=d.data[i+1]=d.data[i+2]=avg;
  }
  ctx.putImageData(d,0,0);

  return c.toDataURL();
}

function detectType(text){
  text=text.toLowerCase();
  if(text.includes("aadhaar")||text.includes("uidai")) return "aadhaar";
  if(/[A-Z]{5}[0-9]{4}[A-Z]/.test(text)) return "pan";
  if(text.includes("election")) return "voter";
  if(text.includes("bank")) return "bank";
  return "unknown";
}

function extract(text){
  const data={};

  const aadhaar=text.match(/\d{4}\s?\d{4}\s?\d{4}/);
  if(aadhaar) data.aadhaar=aadhaar[0];

  const pan=text.match(/[A-Z]{5}[0-9]{4}[A-Z]/);
  if(pan) data.pan=pan[0];

  const dob=text.match(/\d{2}\/\d{2}\/\d{4}/);
  if(dob) data.dob=dob[0];

  const lines=text.split("\n");
  for(let l of lines){
    if(l.length>5 && l.length<40 && !l.match(/\d/)){
      data.name=l.trim();
      break;
    }
  }

  if(text.toLowerCase().includes("male")) data.gender="Male";
  if(text.toLowerCase().includes("female")) data.gender="Female";

  return data;
}

async function handle(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=async function(ev){

    const imgData=ev.target.result;
    document.getElementById('preview').src=imgData;

    const img=new Image();
    img.src=imgData;
    await new Promise(r=>img.onload=r);

    const processed=preprocess(img);

    alert("🤖 AI Scanning...");

    const result=await Tesseract.recognize(processed,'eng+hin');
    const text=result.data.text;

    console.log(text);

    const type=detectType(text);
    const data=extract(text);

    if(data.aadhaar) document.getElementById('f-aadhaar').value=data.aadhaar;
    if(data.pan) document.getElementById('f-pan').value=data.pan;
    if(data.name) document.getElementById('f-name').value=data.name;
    if(data.dob) document.getElementById('f-dob').value=data.dob;
    if(data.gender) document.getElementById('f-gender').value=data.gender;

    alert("✅ "+type+" detected & filled");

  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
